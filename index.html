<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>Simpsons site</h1>
        <p>Fatos sugundo os simpsons</p>
        <style>
            header {
                background-color: #f8e42e;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
                
                              }

            main {
                background-color: #FFFFFF;
                color: #182963;

            }

            article {
                display: flex;
            }

            img {
                width: 80px;
                height: 80px;
            }

            .artigo-autor {
                font-weight: bold;
            }
         
        </style>
    </header>

    <main>
        <article>
            <img src="shrek.jpg"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Portugal vence a copa 2026</h2>
                <p class="artigo-autor">Por: Bart</p>
                <p>Cristiano Ronaldo faz o gol da vitória e derrota México! E Homer simpsons entregando a taça para ele.
                   </p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>
        <article>
            <img src="neymar.jpg"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>portugal roubou para ganhar acopa 2026!!</h2>
                <p class="artigo-autor">Por: Bart</p>
                <p>Eles deram 1.000.000,00 dolares para o juiz 
                    </p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    });



</script>

</html>
